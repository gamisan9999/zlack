name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig fmt --check .

  test:
    name: Test (${{ matrix.name }})
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: mlugg/setup-zig@v2
      - run: zig build
      - run: zig build test --summary all

  release-build:
    name: Release (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
          - name: macos-x64
            os: macos-14
          - name: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: mlugg/setup-zig@v2
      - run: zig build -Doptimize=ReleaseSafe
      - name: Package
        run: tar czf zlack-${{ matrix.name }}.tar.gz -C zig-out/bin zlack
      - uses: actions/upload-artifact@v4
        with:
          name: zlack-${{ matrix.name }}
          path: zlack-${{ matrix.name }}.tar.gz

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/*.tar.gz \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
