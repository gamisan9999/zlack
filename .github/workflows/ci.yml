name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig fmt --check .

  test-linux:
    name: Test (Linux)
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: mlugg/setup-zig@v2
      - run: zig build
      - run: zig build test --summary all

  test-macos:
    name: Test (macOS)
    needs: fmt
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig build
      - run: zig build test --summary all

  release-macos-arm64:
    name: Release (macos-arm64)
    needs: [test-linux, test-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig build -Doptimize=ReleaseSafe
      - uses: actions/upload-artifact@v4
        with:
          name: zlack-macos-arm64
          path: zig-out/bin/zlack*

  release-macos-x64:
    name: Release (macos-x64)
    needs: release-macos-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
      - run: zig build -Doptimize=ReleaseSafe
      - uses: actions/upload-artifact@v4
        with:
          name: zlack-macos-x64
          path: zig-out/bin/zlack*

  release-linux:
    name: Release (linux-x64)
    needs: release-macos-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: mlugg/setup-zig@v2
      - run: zig build -Doptimize=ReleaseSafe
      - uses: actions/upload-artifact@v4
        with:
          name: zlack-linux-x64
          path: zig-out/bin/zlack*
